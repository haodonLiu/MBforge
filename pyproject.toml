[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--import-mode=importlib"
pythonpath = ["src"]

[tool.uv]
index-url = "https://pypi.tuna.tsinghua.edu.cn/simple"
override-dependencies = [
    "pandas>=2.3.3,<3.0.0",
    "numpy>=1.26.4,<2.0.0",
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu128" }
torchvision = { index = "pytorch-cu128" }
torchaudio = { index = "pytorch-cu128" }
uniparser-tools = { path = "setup/UniParser-Tools" }
csar = { path = "setup/openSAR" }

[tool.uv.workspace]
members = [
    "setup/UniParser-Tools",
    "setup/openSAR",
]

[project]
name = "mbforge"
version = "0.1.0"
description = "MBForge - Molecular Knowledge Base & AI Workbench"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "MBForge Team" }
]

# 统一依赖
dependencies = [
    # 现有子包依赖
    "requests>=2.32.0",
    "pandas>=2.3.3,<3.0.0",
    "numpy>=1.26.4,<2.0.0",
    "pillow>=10.4.0",
    "pyyaml>=6.0.0",
    "jinja2>=3.1.0",
    "latex2mathml>=3.77.0",
    "pylatexenc>=2.10",
    "tabulate>=0.9.0",
    "markdown>=3.6",
    "html5lib>=1.1",
    "lxml>=6.0.0",
    "pymupdf>=1.25.0",
    "opencv-python>=4.10.0",
    "scipy>=1.13.0",
    "rdkit>=2024.3.0",
    "networkx>=3.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    # UI
    "pyqt6>=6.6.0",
    "pyqt6-webengine>=6.6.0",
    # AI / RAG
    "chromadb>=0.4.0",
    "torch>=2.6.0",
    "sentence-transformers>=2.5.0",
    "openai>=1.0.0",
    # Utils
    "python-dotenv>=1.0.0",
    "platformdirs>=4.0.0",
    "pydantic>=2.0.0",
    "aiohttp>=3.9.0",
    "anthropic>=0.103.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
    "pyinstaller>=6.0.0",
]

[project.scripts]
mbforge = "mbforge.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
