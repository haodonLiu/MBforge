[[permission]]
identifier = "allow-mol-store"
description = "Allows molecule store operations"
commands.allow = [
  "mol_store_init",
  "mol_store_add",
  "mol_store_list",
  "mol_store_get",
  "mol_store_search",
  "mol_store_delete",
  "mol_store_stats",
  "mol_store_search_by_smiles",
  "mol_store_list_by_doc",
]
