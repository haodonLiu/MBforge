name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Frontend type-check — catches broken `__APP_VERSION__` injection.
  # Mirrors the local `cd frontend && npm run build` step from CLAUDE.md.
  frontend-typecheck:
    name: Frontend type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
