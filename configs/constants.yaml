# MBForge 共享常量 — 单一真相源
#
# 生成命令: python scripts/generate_constants.py
# 生成目标: src/mbforge/utils/constants.py
#
# 仅包含 Python 端共享的常量。
# Python 专有常量（Embedding 指令等）直接写在 constants.py 中。

app:
  name: "MBForge"
  version: "0.3.0"
  author: "MBForge"
  # Python sidecar version policy. When true (default), pyproject.toml
  # [project].version is auto-synced from app.version. Set to false to
  # let the Python sidecar evolve independently as its own crate.
  sync_python_version: true

project:
  format_version: 2
  meta_dir: ".mbforge"

directories:
  memory: "memory"
  trajectory: "trajectory"
  trajectory_file: "trajectory.json"
  summary: "summaries"
  mol_db_filename: "molecules.db"
  kb_collection_docs: "documents"
  index_file: "index.json"
  settings_file: "settings.json"

models:
  default_hf_endpoint: "https://hf-mirror.com"
  cache_dir: "mbforge/models"

providers:
  openai_compatible: "openai_compatible"
  anthropic: "anthropic"
  qwen3: "qwen3"
  sentence_transformers: "sentence_transformers"
  ollama: "ollama"
  api: "api"
  local: "local"
  ocr_none: "none"

llm:
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.9

pdf:
  chunk_size: 512
  chunk_overlap: 128

sidecar:
  default_port: 18792
  default_url: "http://127.0.0.1:18792"

# 文件扩展名（注意：Rust 不带点，Python 带点，由生成脚本处理）
supported_doc_exts: ["md", "txt", "pdf"]
supported_mol_exts: ["sdf", "mol", "mol2", "pdb", "smi"]
