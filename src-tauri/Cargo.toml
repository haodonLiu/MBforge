[package]
name = "mbforge"
version = "0.2.0"
description = "MBForge - Molecular Knowledge Base"
authors = ["MBForge Team"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["shell-sidecar"] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
