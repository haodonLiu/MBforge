# MBForge 共享常量 — 单一真相源
#
# 生成命令: python scripts/generate_constants.py
# 生成目标: src-tauri/src/core/config/constants.rs + src/mbforge/utils/constants.py
#
# 仅包含 Rust 和 Python 都需要的常量。
# Rust 专有常量（Tauri 事件名、Agent 配置）直接写在 constants.rs 中。
# Python 专有常量（Embedding 指令、ChromaDB 配置）直接写在 constants.py 中。

app:
  name: "MBForge"
  version: "0.2.0"
  author: "MBForge"

project:
  format_version: 1
  meta_dir: ".mbforge"

directories:
  memory: "memory"
  trajectory: "trajectory"
  trajectory_file: "trajectory.json"
  summary: "summaries"
  mol_db_filename: "molecules.db"
  kb_collection_docs: "documents"
  index_file: "index.json"
  settings_file: "settings.json"

models:
  default_embed: "Qwen/Qwen3-Embedding-0.6B"
  default_rerank: "Qwen/Qwen3-Reranker-0.6B"
  default_hf_endpoint: "https://hf-mirror.com"
  cache_dir: ".cache/mbforge/models"

providers:
  openai_compatible: "openai_compatible"
  anthropic: "anthropic"
  qwen3: "qwen3"
  sentence_transformers: "sentence_transformers"
  ollama: "ollama"
  api: "api"
  local: "local"
  ocr_none: "none"

llm:
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.9

pdf:
  chunk_size: 512
  chunk_overlap: 128

sidecar:
  default_port: 18792
  default_url: "http://127.0.0.1:18792"

# 文件扩展名（注意：Rust 不带点，Python 带点，由生成脚本处理）
supported_doc_exts: ["md", "txt", "pdf"]
supported_mol_exts: ["sdf", "mol", "mol2", "pdb", "smi"]
