[package]
name = "mbforge"
version = "0.2.0"
description = "MBForge - Molecular Knowledge Base"
authors = ["MBForge Team"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
pdf-inspector = { git = "https://github.com/firecrawl/pdf-inspector" }
regex = "1"
sha2 = "0.10"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
walkdir = "2"
directories = "5"
tempfile = "3"
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls", "multipart", "blocking"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
futures = "0.3"
tokio-stream = "0.1"
grep-searcher = "0.1"
grep-regex = "0.1"
grep-matcher = "0.1"
ignore = "0.4"
globset = "0.4"
zip = "0.6"
dotenvy = "0.15"
base64 = "0.22"
lopdf = "0.34"
rusqlite = { version = "0.32", features = ["bundled"] }
