version: 1
plan:
  name: "UniDock 插件集成"
  max_concurrency: 2
  max_consecutive_failures: 2
  max_cycles: 3

tasks:
  - id: create-plugin
    title: "创建 UniDockPlugin 插件文件"
    assigned_to: developer
    verified_by: agent-df1970ecd4b0
    verify_prompt: "验证 plugin.py 结构：检查 UniDockPlugin 类是否继承 BasePlugin、meta 的 name 是否为 unidock、是否包含 run_docking/_run_unidock/_parse_unidock_output/_prepare_ligand/register_tools/register_cli/get_workflow_steps 方法、是否有详细 docstring 和中文注释、是否有 graceful fallback、__init__.py 是否存在。"
    timeout_ms: 1800000
    prompt: |
      在 MBForge 项目中创建新的 UniDock 分子对接插件。

      项目路径：C:\Users\10954\Desktop\MBForge
      新建文件：src/mbforge/plugins/unidock/plugin.py
      现有模板参考：src/mbforge/plugins/cadd_template/plugin.py

      ========== UniDock 技术背景 ==========
      Uni-Dock 是深势科技开发的高性能 GPU 加速分子对接引擎（Apache 2.0 开源），
      GitHub: https://github.com/dptech-corp/Uni-Dock
      支持 vina/vinardo/ad4 打分函数，V100 GPU 比单核 CPU 快 2000 倍。

      ========== UniDock CLI 参数（官方 --help 输出） ==========
      Input:
        --receptor arg             受体 PDBQT 文件路径（PDBQT 或 PDB）
        --flex arg                 柔性侧链文件（PDBQT 或 PDB）
        --ligand arg               单个配体文件（PDBQT）
        --ligand_index arg         配体路径索引文件（PDBQT 或 SDF）
        --batch arg                批量配体（PDBQT）
        --gpu_batch arg            GPU 批量配体（PDBQT 或 SDF）
        --scoring arg (=vina)      打分函数：ad4 | vina | vinardo

      Search space（搜索空间）：
        --maps arg                 AD4 或 Vina 的 affinity maps
        --center_x arg             对接盒子中心 X 坐标 (Å)
        --center_y arg             对接盒子中心 Y 坐标 (Å)
        --center_z arg             对接盒子中心 Z 坐标 (Å)
        --size_x arg               对接盒子 X 尺寸 (Å)
        --size_y arg               对接盒子 Y 尺寸 (Å)
        --size_z arg               对接盒子 Z 尺寸 (Å)
        --autobox                  根据配体设置盒子大小

      Output：
        --out arg                  输出文件路径
        --dir arg                  批量输出目录
        --write_maps arg           输出 maps 文件路径

      Misc：
        --cpu arg (=0)             CPU 核心数
        --seed arg (=0)            随机种子
        --exhaustiveness arg (=8)  搜索穷尽度（1+）
        --max_evals arg (=0)       每轮 MC 最大评估次数
        --num_modes arg (=9)       最大输出构象数
        --min_rmsd arg (=1)        输出构象间的最小 RMSD
        --energy_range arg (=3)     最佳与最差构象的最大能量差 (kcal/mol)
        --spacing arg (=0.375)     网格间距 (Å)
        --verbosity arg (=1)       输出详细度：0=无输出，1=正常，2=详细
        --max_step arg (=0)        每轮 MC 最大步数
        --refine_step arg (=5)     精修步数
        --max_gpu_memory arg (=0)   GPU 显存上限（MB）
        --search_mode arg          搜索模式：fast | balance | detail
        --config arg               配置文件路径

      搜索模式预设：
        fast    : exhaustiveness=128,  max_step=20
        balance : exhaustiveness=384,  max_step=40   ← 推荐默认
        detail  : exhaustiveness=512,  max_step=40

      FAQ 关键信息：
        - GPU OOM：用 --max_gpu_memory 限制显存
        - 命令行过长：用 --ligand_index 代替 --gpu_batch
        - paired_batch 模式：--paired_batch_size + JSON 配置（1:1 批量加速）

      conda 安装：conda create -n unidock_env unidock -c conda-forge

      ========== 实现要求 ==========
      1. 参考 cadd_template/plugin.py 的整体结构和命名风格
      2. 新建目录 src/mbforge/plugins/unidock/__init__.py（空文件，写 __all__）
      3. plugin.py 包含：
         - 模块级 docstring（说明 UniDock 用途、安装方式、支持的参数）
         - UniDockResult dataclass（继承或模仿 DockingResult）
         - UniDockPlugin 类（继承 BasePlugin）：
           * meta 定义 name="unidock"，capabilities=[AGENT_TOOL, WORKFLOW, CLI_COMMAND]
           * setup() 检查 unidock 是否可用，输出可用状态
           * run_docking() 主方法（接受 RDKit Mol + 参数）
           * _run_unidock() 内部方法：subprocess 调用 unidock CLI
           * _parse_unidock_output() 解析输出文件
           * _prepare_ligand() 用 RDKit 将 Mol 转为 PDBQT
           * register_tools() 向 Agent 注册工具
           * register_cli() 注册 CLI 子命令
           * get_workflow_steps() 返回工作流步骤
      4. graceful fallback：UniDock 不可用时输出警告，不崩溃
      5. 所有方法必须有详细 docstring，中文注释
      6. 代码风格与 cadd_template 保持一致

      ========== 输出 ==========
      1. 创建 src/mbforge/plugins/unidock/__init__.py
      2. 创建 src/mbforge/plugins/unidock/plugin.py
      3. 在 plugins/__init__.py 添加 unidock 引用（如需要）
      4. 完成后报告创建的文件列表。

  - id: add-ui
    title: "添加 UniDock 参数配置 UI"
    assigned_to: developer
    verified_by: agent-df1970ecd4b0
    verify_prompt: "验证 unidock_dialog.py：检查是否包含 UniDockConfigDialog 类、是否继承 QDialog、所有参数字段（receptor_file/center_x/size_x/search_mode/scoring/num_modes/exhaustiveness 等）是否都有对应的 setToolTip()、QFormLayout 排列、运行/取消按钮、字段验证逻辑。检查 main_window.py 是否添加了 UniDock 菜单或工具栏入口。"
    timeout_ms: 1800000
    prompt: |
      在 MBForge 主程序中添加 UniDock 对接参数的配置 UI。

      项目路径：C:\Users\10954\Desktop\MBForge
      参考文件：
        - src/mbforge/ui/workflow_panel.py（工作流面板结构）
        - src/mbforge/ui/dialogs.py（对话框风格）
        - src/mbforge/ui/components.py（基础组件）
        - src/mbforge/ui/main_window.py（主窗口注册方式）

      ========== UI 设计要求 ==========
      1. 新建文件 src/mbforge/ui/unidock_dialog.py
      2. 实现 UniDockConfigDialog 类（继承 QDialog）：
         - 标题：UniDock 对接配置
         - 每个字段带 setToolTip() 鼠标悬停提示

      === 参数及 Tooltip 说明 ===
      | 字段名 | 类型 | 默认值 | Tooltip 说明 |
      | receptor_file | QLineEdit | "" | "受体蛋白 PDBQT 文件路径" |
      | ligand_smiles | QLineEdit | "" | "配体分子 SMILES 字符串，如 CC(=O)Oc1ccccc1C(=O)O" |
      | center_x | QDoubleSpinBox | 0.0 | "对接盒子中心 X 坐标（Å）" |
      | center_y | QDoubleSpinBox | 0.0 | "对接盒子中心 Y 坐标（Å）" |
      | center_z | QDoubleSpinBox | 0.0 | "对接盒子中心 Z 坐标（Å）" |
      | size_x | QDoubleSpinBox | 22.5 | "对接盒子 X 方向尺寸（Å）" |
      | size_y | QDoubleSpinBox | 22.5 | "对接盒子 Y 方向尺寸（Å）" |
      | size_z | QDoubleSpinBox | 22.5 | "对接盒子 Z 方向尺寸（Å）" |
      | search_mode | QComboBox | balance | "fast：最快（适合大规模初筛）\nbalance：平衡，推荐默认\ndetail：最精确（适合精筛）" |
      | scoring | QComboBox | vina | "vina：AutoDock Vina 打分函数\nvinardo：更快\nad4：AutoDock4 打分函数" |
      | num_modes | QSpinBox | 9 | "最多输出多少个结合构象" |
      | exhaustiveness | QSpinBox | 32 | "搜索穷尽度，数值越大越慢但越精确" |

      3. QFormLayout 排列，左标签右输入
      4. 底部"运行"和"取消"按钮
      5. 点击"运行"验证必要字段（receptor_file + ligand_smiles），不足时弹出提示
      6. 风格与 dialogs.py 保持一致

      ========== 主窗口集成 ==========
      修改 src/mbforge/ui/main_window.py：
        - 在菜单或工具栏添加 UniDock 入口按钮
        - 点击弹出 UniDockConfigDialog

      ========== 输出 ==========
      1. 创建 src/mbforge/ui/unidock_dialog.py
      2. 修改 src/mbforge/ui/main_window.py
      3. 报告修改的具体行数

  - id: write-docs
    title: "编写 UniDock 插件详细文档"
    depends_on: [create-plugin]
    assigned_to: developer
    verified_by: agent-df1970ecd4b0
    verify_prompt: "验证 README.md：检查是否包含 UniDock 简介、安装指南、输入文件准备、参数说明表、使用示例、结果解读、FAQ 全部七个章节，中文为主，技术术语保留英文。"
    timeout_ms: 1800000
    prompt: |
      为 UniDock 插件编写详细使用文档。

      项目路径：C:\Users\10954\Desktop\MBForge
      插件路径：src/mbforge/plugins/unidock/plugin.py（已在其他任务创建）

      ========== 文档内容要求 ==========
      创建文件：src/mbforge/plugins/unidock/README.md
      内容包含：
      1. UniDock 简介（200字内）
         - 什么是 UniDock，与 AutoDock Vina 的区别
         - 适用场景：千万级虚拟筛选
         - 性能数据：V100 GPU 2000x 加速

      2. 安装指南
         - conda 安装命令
         - 环境要求：CUDA >= 11.8，NVIDIA GPU (compute capability >= 7.0)
         - 验证安装：unidock --version

      3. 输入文件准备
         - 受体准备：PDB → PDBQT（用 prepare_receptor4.py 或 meeko）
         - 配体准备：SDF/SMILES → PDBQT（用 meeko 或 obabel）

      4. 参数说明表（完整中文参数文档）
         - 每个 CLI 参数的中文说明、默认值

      5. 使用示例
         - 单配体对接
         - 批量对接
         - 三种搜索模式选用建议

      6. 结果解读
         - 输出文件说明
         - 亲和力（kcal/mol）含义

      7. FAQ
         - GPU OOM 处理
         - 命令行过长处理
         - 少量配体时速度慢的原因

      ========== 输出 ==========
      创建 src/mbforge/plugins/unidock/README.md（Markdown 格式，中文为主）
