version: 1
plan:
  name: "MBForge 死代码审查"
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 2

tasks:
  - id: audit-imports
    title: "审查未使用的 import 与未定义名字"
    assigned_to: general
    verified_by: verifier
    verify_prompt: "检查报告是否包含所有 ruff F401/F821/F841/F811 错误，格式是否符合要求（表格+汇总），每个问题是否有原因和修复建议。"
    prompt: |
      你是一名 Python 代码审查专家。你的任务是对 MBForge 项目进行死代码审查（仅审查，不修复，不改任何文件）。

      审查范围：C:\Users\10954\Desktop\MBForge\src\mbforge\
      审查目标：未使用的 import (F401)、未定义的名字 (F821)、未使用的变量/赋值 (F841)、重复定义的类 (F811)

      执行步骤：
      1. 在 C:\Users\10954\Desktop\MBForge 目录下运行：
         uv run ruff check src/ --select F401,F821,F841,F811 --output-format=concise
      2. 对每条错误，输出详细报告：
         - 文件路径和行号
         - 错误类型和具体代码片段
         - 为什么这是死代码
         - 修复建议（一句话，不实际修改）
      3. 将报告保存为 C:\Users\10954\Desktop\MBForge\.mavis\plans\dead-code-report-imports.md

      输出格式：
      - 🔴 F821未定义名字（运行时必报错）放最前
      - 🟡 F841未使用变量其次
      - 🟢 F401未使用import最后
      - 每个问题：| 文件 | 行号 | 类型 | 代码片段 | 原因 | 修复建议 |
      - 文末汇总表：按文件统计各类问题数量

  - id: audit-structure
    title: "审查未使用的类、函数与代码结构"
    assigned_to: general
    verified_by: verifier
    verify_prompt: "检查报告是否包含所有 ruff B007/B027/B028/C901 错误，以及 TODO/FIXME 注释中真正未实现的功能。报告格式是否符合要求，影响分析是否到位。"
    prompt: |
      你是一名 Python 代码审查专家。你的任务是对 MBForge 项目进行死代码审查（仅审查，不修复，不改任何文件）。

      审查范围：C:\Users\10954\Desktop\MBForge\src\mbforge\
      审查目标：
      1. 未使用的循环变量（B007/B028）
      2. 空方法 / pass stub（B027：BasePlugin 中的空方法）
      3. 复杂度超标的函数（C901 > 10）
      4. TODO/FIXME 注释中标记为"未实现"的功能

      执行步骤：
      1. 运行 ruff 检查：
         uv run ruff check src/ --select B007,B027,B028,C901 --output-format=concise
      2. 搜索 TODO/FIXME：
         rg "TODO|FIXME|XXX|HACK|NOT IMPLEMENTED" C:\Users\10954\Desktop\MBForge\src\mbforge\ -n --type py
      3. 读 plugins/base.py 的 BasePlugin 类，列出所有空方法并判断是否合理
      4. 输出审查报告

      输出格式：
      - 🔴 严重：空方法/未实现接口、TODO标记得未实现核心功能
      - 🟡 中等：未使用循环变量、复杂度过高函数
      - 每个问题：| 文件 | 行号 | 类型 | 代码片段 | 影响分析 |
      - 文末汇总表

  - id: audit-style
    title: "审查废弃类型注解与代码风格"
    assigned_to: general
    verified_by: verifier
    verify_prompt: "检查报告是否统计了所有 UP/SIM/B033 类别，数量是否准确，典型案例是否代表该类型。"
    prompt: |
      你是一名 Python 代码审查专家。你的任务是对 MBForge 项目进行死代码审查（仅审查，不修复，不改任何文件）。

      审查范围：C:\Users\10954\Desktop\MBForge\src\mbforge\
      审查目标：
      1. 废弃的 typing 类型（UP006/UP035：List→list, Dict→dict, Tuple→tuple）
      2. 过时的类型注解写法（UP045：Optional[X]→X|None，UP037：字符串类型引用）
      3. 多余的 open mode 参数（UP015）
      4. 可简化的模式（SIM103/SIM105/SIM108）
      5. 重复集合元素（B033）

      执行步骤：
      1. 运行 ruff：
         uv run ruff check src/ --select UP006,UP015,UP035,UP037,UP045,SIM103,SIM105,SIM108,B033 --output-format=concise
      2. 统计各类问题数量和分布（不需要逐条列出）
      3. 每个类型选1-2个代表性例子

      输出格式：
      - 问题类型总表：| 类型 | 总数量 | 涉及文件数 | 典型文件 |
      - 典型案例（每类型1-2条）
      - 整体评估：轻微 / 中等 / 严重
